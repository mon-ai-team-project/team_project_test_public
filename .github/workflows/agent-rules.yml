name: Agent rules

on:
  pull_request:
    branches:
      - main

jobs:
  validate-agent-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate agent scope and records
        run: node scripts/validate-agent-rules.mjs origin/${{ github.base_ref }}
